<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ideia de Dates </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

<div id="page-app" class="page active">

  <!-- Overlay -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <svg viewBox="0 0 24 24" class="icon">
          <path fill="currentColor" stroke="none" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Date Planner
      </div>
      <button class="sidebar-close" onclick="closeSidebar()">
        <svg viewBox="0 0 24 24" class="icon"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="marcar.html" class="sidebar-nav-item" data-page="marcar">
        <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Marcar Date
      </a>
      <a href="ideias.html" class="sidebar-nav-item active" data-page="ideias">
        <svg viewBox="0 0 24 24" class="icon"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        Ideia de Dates
      </a>
      <a href="calendario.html" class="sidebar-nav-item" data-page="calendario">
        <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendário
      </a>
    </nav>
    <div class="sidebar-footer">
      Feito com
      <svg viewBox="0 0 24 24"><path fill="currentColor" stroke="none" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      para vocês
    </div>
  </aside>

  <!-- Header -->
  <header id="main-header">
    <div class="header-inner">
      <button class="header-menu-btn" onclick="openSidebar()" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" class="icon"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-title">
        <svg viewBox="0 0 24 24"><path fill="currentColor" stroke="none" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Ideia de Dates</span>
      </div>
      <div class="header-spacer"></div>
    </div>
  </header>

  <!-- Content -->
  <main id="main-content">
    <section id="section-ideias" class="section">
      <div class="section-header">
        <div class="section-icon-wrap">
          <svg viewBox="0 0 24 24" class="icon">
            <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
            <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
          </svg>
        </div>
        <h2 class="section-title">Ideia de Dates</h2>
        <p class="section-subtitle">Anote suas ideias e inspire-se</p>
      </div>

      <div style="max-width:32rem;margin:0 auto">
        <div class="card ideias-input-card">
          <label class="form-label">
            <svg viewBox="0 0 24 24" class="icon" style="width:1rem;height:1rem;color:var(--primary)">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Nova ideia de date
          </label>
          <textarea
            id="ideia-input"
            class="ideias-textarea"
            rows="3"
            placeholder="Descreva sua ideia de date aqui... Ex: Visitar o museu de arte e tomar sorvete depois"
            onkeydown="if(event.ctrlKey&&event.key==='Enter')addIdeia()"
          ></textarea>
          <button class="btn-primary" style="margin-top:0.75rem" onclick="addIdeia()">
            <svg viewBox="0 0 24 24" class="icon" style="width:1rem;height:1rem;stroke:#fff">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Adicionar Ideia
          </button>
        </div>

        <div id="ideias-list" class="ideias-list"></div>
      </div>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav id="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="marcar.html" class="bottom-nav-item" data-page="marcar">
        <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Marcar Date
      </a>
      <a href="ideias.html" class="bottom-nav-item active" data-page="ideias">
        <svg viewBox="0 0 24 24" class="icon"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        Ideia de Dates
      </a>
      <a href="calendario.html" class="bottom-nav-item" data-page="calendario">
        <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendário
      </a>
    </div>
  </nav>

</div>

<script src="../js/app.js"></script>
<script>
  // Render ideias on page load
  renderIdeias();
</script>
</body>
</html>
